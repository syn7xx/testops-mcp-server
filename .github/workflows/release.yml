name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: Semver bump (patch / minor / major)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version, update changelog, create tag
        run: npx commit-and-tag-version --release-as ${{ inputs.increment }}

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          VERSION="${TAG#v}"
          echo "Creating GitHub Release for ${TAG}"

          # Extract release notes from CHANGELOG.md (section between first and second ## headers)
          RELEASE_NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)

          gh release create "${TAG}" \
            --title "Release ${TAG}" \
            --notes "${RELEASE_NOTES:-Release ${TAG}}"
